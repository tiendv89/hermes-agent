name: 'Hermes Agent: CI'

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "workflow_gateway/Dockerfile"
      - "workflow_gateway/**"
      - ".github/workflows/ci.yaml"
  pull_request:
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "workflow_gateway/Dockerfile"
      - "workflow_gateway/**"
      - ".github/workflows/ci.yaml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/hermes-agent

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install ruff
        run: uv tool install ruff

      - name: ruff check
        run: ruff check .

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: workflow_gateway/Dockerfile
          push: false
          platforms: linux/amd64
          cache-from: type=gha,scope=workflow-gateway-ci
          cache-to: type=gha,mode=max,scope=workflow-gateway-ci
